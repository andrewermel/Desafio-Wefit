version: '3.8'

services:
  mysqldb:
    platform: linux/x86_64
    image: mysql:5.6
    restart: unless-stopped
    env_file: ./.env
    environment:
      - MYSQL_ROOT_PASSWORD=senha_root_123
      - MYSQL_DATABASE=wefit
    ports:
      - 3306:3306
    volumes:
      - ./data/:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      timeout: 20s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    env_file: ./.env
    environment:
      - DB_HOST=mysqldb
      - NODE_ENV=production
    ports:
      - 3000:3000
    depends_on:
      mysqldb:
        condition: service_healthy
    volumes:
      - ./src:/app/src
